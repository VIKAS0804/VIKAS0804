<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vikas Neriyanuru profile banner</title>
  <desc id="desc">A dark profile banner highlighting software engineering, cloud systems, full-stack applications, and ML tooling.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .metricNum { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .metricText { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #A5B4CC; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>

  <circle cx="1030" cy="70" r="92" fill="#0F172A"/>
  <circle cx="1030" cy="70" r="78" fill="url(#accent)" opacity="0.18" filter="url(#glow)"/>
  <circle cx="1085" cy="245" r="120" fill="#0F172A" opacity="0.9"/>

  <rect x="42" y="44" width="110" height="30" rx="15" fill="#111C30" stroke="#20314A"/>
  <text x="61" y="64" class="small">Boston, MA</text>

  <text x="42" y="118" class="title">Vikas Neriyanuru</text>
  <text x="42" y="152" class="subtitle">Cloud-native software engineer</text>
  <text x="42" y="182" class="small">MS CS at Northeastern | Ex-SDE at Jio Platforms</text>
  <text x="42" y="206" class="small">Backend systems, full-stack apps, cloud infra, and ML tooling</text>

  <rect x="42" y="238" width="180" height="48" rx="14" fill="#101A2D" stroke="#1F314B"/>
  <text x="58" y="260" class="metricNum">400,000+</text>
  <text x="58" y="279" class="metricText">users reached in enterprise platforms</text>

  <rect x="242" y="238" width="180" height="48" rx="14" fill="#101A2D" stroke="#1F314B"/>
  <text x="258" y="260" class="metricNum">50,000+</text>
  <text x="258" y="279" class="metricText">requests per day in production</text>

  <rect x="442" y="238" width="180" height="48" rx="14" fill="#101A2D" stroke="#1F314B"/>
  <text x="458" y="260" class="metricNum">40%</text>
  <text x="458" y="279" class="metricText">manual work removed via automation</text>

  <rect x="760" y="58" width="182" height="38" rx="19" fill="#0F1B2E" stroke="#21405F"/>
  <text x="791" y="82" class="label">Backend Systems</text>

  <rect x="947" y="58" width="182" height="38" rx="19" fill="#0F1B2E" stroke="#21405F"/>
  <text x="986" y="82" class="label">Full-stack Apps</text>

  <rect x="760" y="108" width="182" height="38" rx="19" fill="#0F1B2E" stroke="#21405F"/>
  <text x="799" y="132" class="label">Cloud / DevOps</text>

  <rect x="947" y="108" width="182" height="38" rx="19" fill="#0F1B2E" stroke="#21405F"/>
  <text x="989" y="132" class="label">ML Tooling</text>

  <rect x="760" y="172" width="369" height="86" rx="18" fill="#0E1728" stroke="#1E2B42"/>
  <text x="786" y="202" class="metricNum">Build style</text>
  <text x="786" y="227" class="metricText">Intentional UX, strong backend foundations, measurable impact, and production-minded implementation.</text>
</svg>
